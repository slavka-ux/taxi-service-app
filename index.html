<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ SkyBook — Сервіс бронювання авіаквитків</title>
    
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #2196F3;
            --primary-dark: #1565C0;
            --secondary: #1A237E;
            --accent: #FF6F00;
            --success: #4CAF50;
            --light: #F5F7FA;
            --dark: #1a1a2e;
            --white: #FFFFFF;
            --gray: #6B7280;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.15);
            --radius: 12px;
            --transition: all 0.3s ease;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--secondary);
        }
        
        .search-form {
            background: var(--white);
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        
        @media (max-width: 768px) {
            .search-form {
                grid-template-columns: 1fr;
            }
        }
        
        /* ========== DROPDOWN ========== */
        .dropdown {
            position: relative;
            width: 100%;
        }
        
        .dropdown-label {
            font-weight: 600;
            color: var(--dark);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
            display: block;
        }
        
        .dropdown-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .dropdown-input {
            width: 100%;
            padding: 0.9rem 2.5rem 0.9rem 1rem;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
            transition: var(--transition);
            background: var(--white);
            color: var(--dark);
        }
        
        .dropdown-input::placeholder {
            color: #9CA3AF;
        }
        
        .dropdown-input:hover {
            border-color: #90CAF9;
        }
        
        .dropdown-input:focus,
        .dropdown-input.active {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.15);
        }
        
        .dropdown-arrow {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray);
            pointer-events: none;
            transition: var(--transition);
            font-size: 0.8rem;
        }
        
        .dropdown-input.active + .dropdown-arrow {
            transform: translateY(-50%) rotate(180deg);
            color: var(--primary);
        }
        
        .dropdown-menu {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            right: 0;
            background: var(--white);
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            display: none;
            overflow: hidden;
        }
        
        .dropdown-menu.show {
            display: block;
            animation: fadeIn 0.2s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .dropdown-menu-header {
            padding: 0.5rem;
            border-bottom: 1px solid #f0f0f0;
            background: #FAFAFA;
            font-size: 0.8rem;
            color: var(--gray);
            text-align: center;
        }
        
        .dropdown-options {
            max-height: 280px;
            overflow-y: auto;
        }
        
        .dropdown-options::-webkit-scrollbar {
            width: 6px;
        }
        
        .dropdown-options::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }
        
        .dropdown-options::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }
        
        .dropdown-option {
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: background 0.15s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #F5F5F5;
        }
        
        .dropdown-option:last-child {
            border-bottom: none;
        }
        
        .dropdown-option:hover {
            background: #E3F2FD;
        }
        
        .dropdown-option.selected {
            background: #BBDEFB;
            font-weight: 600;
        }
        
        .dropdown-option .city-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        
        .dropdown-option .city-name {
            font-weight: 500;
            color: var(--dark);
        }
        
        .dropdown-option .city-airport {
            font-size: 0.8rem;
            color: var(--gray);
        }
        
        .dropdown-option .city-code {
            font-weight: 700;
            color: var(--white);
            background: var(--primary);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        
        .dropdown-no-results {
            padding: 1.5rem;
            text-align: center;
            color: var(--gray);
        }
        
        .dropdown-no-results .icon {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.5rem;
        }
        
        /* Підсвічування тексту при пошуку */
        .highlight {
            background: #FFF9C4;
            padding: 0 2px;
            border-radius: 2px;
        }
        
        .btn-search {
            grid-column: 1 / -1;
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .btn-search:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✈️ SkyBook — Пошук авіаквитків</h1>
        
        <div class="search-form">
            <!-- Поле "Звідки" -->
            <div class="dropdown" id="dropdownFrom">
                <label class="dropdown-label">🛫 Звідки</label>
                <div class="dropdown-input-wrapper">
                    <input 
                        type="text" 
                        class="dropdown-input" 
                        placeholder="Оберіть місто вильоту..."
                        autocomplete="off"
                    >
                    <span class="dropdown-arrow">▼</span>
                </div>
                <div class="dropdown-menu">
                    <div class="dropdown-menu-header">
                        🔍 Почніть вводити назву міста для пошуку
                    </div>
                    <div class="dropdown-options"></div>
                </div>
                <input type="hidden" class="dropdown-value">
            </div>
            
            <!-- Поле "Куди" -->
            <div class="dropdown" id="dropdownTo">
                <label class="dropdown-label">🛬 Куди</label>
                <div class="dropdown-input-wrapper">
                    <input 
                        type="text" 
                        class="dropdown-input" 
                        placeholder="Оберіть місто призначення..."
                        autocomplete="off"
                    >
                    <span class="dropdown-arrow">▼</span>
                </div>
                <div class="dropdown-menu">
                    <div class="dropdown-menu-header">
                        🔍 Почніть вводити назву міста для пошуку
                    </div>
                    <div class="dropdown-options"></div>
                </div>
                <input type="hidden" class="dropdown-value">
            </div>
            
            <button class="btn-search" onclick="handleSearch()">
                🔍 Знайти рейси
            </button>
        </div>
    </div>
    
    <script>

            { code: "VIN", city: "Вінниця", country: "Україна", airport: "Вінниця" },

            { code: "KRK", city: "Краків", country: "Польща", airport: "Краків" },

            { code: "ZRH", city: "Цюрих", country: "Швейцарія", airport: "Цюрих" },
            { code: "ARN", city: "Стокгольм", country: "Швеція", airport: "Арланда" },
            { code: "CPH", city: "Копенгаген", country: "Данія", airport: "Копенгаген" },
            { code: "OSL", city: "Осло", country: "Норвегія", airport: "Осло" },
            { code: "HEL", city: "Гельсінкі", country: "Фінляндія", airport: "Гельсінкі" },
            
            // Азія
            { code: "DXB", city: "Дубай", country: "ОАЕ", airport: "Дубай" },
            { code: "AUH", city: "Абу-Дабі", country: "ОАЕ", airport: "Абу-Дабі" },
            { code: "DOH", city: "Доха", country: "Катар", airport: "Доха" },
            { code: "TLV", city: "Тель-Авів", country: "Ізраїль", airport: "Бен-Гуріон" },
            { code: "BKK", city: "Бангкок", country: "Таїланд", airport: "Суварнабхумі" },
            { code: "NRT", city: "Токіо", country: "Японія", airport: "Наріта" },
            { code: "HND", city: "Токіо", country: "Японія", airport: "Ханеда" },
            { code: "ICN", city: "Сеул", country: "Південна Корея", airport: "Інчхон" },
            
            // Америка
            { code: "JFK", city: "Нью-Йорк", country: "США", airport: "Кеннеді" },
            { code: "EWR", city: "Нью-Йорк", country: "США", airport: "Ньюарк" },
            { code: "LAX", city: "Лос-Анджелес", country: "США", airport: "Лос-Анджелес" },
            { code: "ORD", city: "Чикаго", country: "США", airport: "О'Хара" },
            { code: "MIA", city: "Маямі", country: "США", airport: "Маямі" },
            { code: "YYZ", city: "Торонто", country: "Канада", airport: "Торонто" },
            { code: "YVR", city: "Ванкувер", country: "Канада", airport: "Ванкувер" },
        ];
        
        // ========== DROPDOWN КЛАС ==========
        class SearchableDropdown {
            constructor(containerId) {
                this.container = document.getElementById(containerId);
                this.input = this.container.querySelector('.dropdown-input');
                this.menu = this.container.querySelector('.dropdown-menu');
                this.optionsContainer = this.container.querySelector('.dropdown-options');
                this.hiddenInput = this.container.querySelector('.dropdown-value');
                this.selectedValue = null;
                this.selectedText = '';
                
                this.init();
            }
            
            init() {
                // Показати всі опції при фокусі/кліку
                this.input.addEventListener('focus', () => this.showMenu());
                this.input.addEventListener('click', () => this.showMenu());
                
                // Фільтрувати при вводі тексту
                this.input.addEventListener('input', () => {
                    this.filterOptions(this.input.value);
                    this.showMenu();
                });
                
                // Закриття меню при кліку поза компонентом
                document.addEventListener('click', (e) => {
                    if (!this.container.contains(e.target)) {
                        this.hideMenu();
                    }
                });
                
                // Початкове відображення всіх опцій
                this.renderOptions(airports);
            }
            
            showMenu() {
                this.menu.classList.add('show');
                this.input.classList.add('active');
                if (!this.input.value) {
                    this.renderOptions(airports);
                }
            }
            
            hideMenu() {
                this.menu.classList.remove('show');
                this.input.classList.remove('active');
            }
            
            selectOption(airport) {
                this.selectedValue = airport.code;
                this.selectedText = `${airport.city}, ${airport.country} (${airport.code})`;
                
                this.input.value = this.selectedText;
                this.hiddenInput.value = airport.code;
                
                this.hideMenu();
                this.renderOptions(airports); // Оновити список
            }
            
            filterOptions(query) {
                if (!query.trim()) {
                    this.renderOptions(airports);
                    return;
                }
                
                const lowerQuery = query.toLowerCase();
                const filtered = airports.filter(a => 
                    a.city.toLowerCase().includes(lowerQuery) ||
                    a.country.toLowerCase().includes(lowerQuery) ||
                    a.code.toLowerCase().includes(lowerQuery) ||
                    a.airport.toLowerCase().includes(lowerQuery)
                );
                
                this.renderOptions(filtered, lowerQuery);
            }
            
            renderOptions(data, highlight = '') {
                if (data.length === 0) {
                    this.optionsContainer.innerHTML = `
                        <div class="dropdown-no-results">
                            <span class="icon">🔍</span>
                            <p>Місто не знайдено</p>
                            <small>Спробуйте змінити запит</small>
                        </div>
                    `;
                    return;
                }
                
                this.optionsContainer.innerHTML = data.map(airport => {
                    const isSelected = this.selectedValue === airport.code;
                    const cityName = highlight ? 
                        this.highlightText(airport.city, highlight) : 
                        airport.city;
                    const airportName = highlight ? 
                        this.highlightText(airport.airport, highlight) : 
                        airport.airport;
                    
                    return `
                        <div class="dropdown-option ${isSelected ? 'selected' : ''}" 
                             onclick="document.getElementById('${this.container.id}').dropdown.selectOption({code:'${airport.code}', city:'${airport.city.replace(/'/g, "\\'")}', country:'${airport.country.replace(/'/g, "\\'")}', airport:'${airport.airport.replace(/'/g, "\\'")}'})">
                            <div class="city-info">
                                <span class="city-name">${cityName}, ${airport.country}</span>
                                <span class="city-airport">${airportName}</span>
                            </div>
                            <span class="city-code">${airport.code}</span>
                        </div>
                    `;
                }).join('');
            }
            
            highlightText(text, query) {
                const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                return text.replace(regex, '<span class="highlight">$1</span>');
            }
            
            getValue() {
                return this.hiddenInput.value;
            }
            
            getText() {
                return this.input.value;
            }
        }
        
        // ========== ІНІЦІАЛІЗАЦІЯ ==========
        const dropdownFrom = new SearchableDropdown('dropdownFrom');
        const dropdownTo = new SearchableDropdown('dropdownTo');
        
        // Зберігаємо посилання на об'єкти в DOM для зручного доступу
        document.getElementById('dropdownFrom').dropdown = dropdownFrom;
        document.getElementById('dropdownTo').dropdown = dropdownTo;
        
        // ========== ОБРОБНИК ПОШУКУ ==========
        function handleSearch() {
            const from = dropdownFrom.getValue();
            const to = dropdownTo.getValue();
            
            if (!from) {
                alert('❌ Будь ласка, оберіть місто вильоту');
                dropdownFrom.input.focus();
                return;
            }
            
            if (!to) {
                alert('❌ Будь ласка, оберіть місто призначення');
                dropdownTo.input.focus();
                return;
            }
            
            if (from === to) {
                alert('❌ Місто вильоту та призначення не можуть бути однаковими');
                return;
            }
            
            alert(`✅ Пошук рейсів:\n🛫 ${dropdownFrom.getText()}\n🛬 ${dropdownTo.getText()}`);
        }
    </script>
</body>
</html>
